system_name: heterogeneous_jetson_final
mode: distributed

nodes:
  - name: worker1
    role: worker
    host: worker1
    device: cpu
  - name: worker2
    role: worker
    host: worker2
    device: cpu
  - name: jetson1
    role: worker
    host: jetson1
    device: cpu

paths:
  data_root: ./data
  results_root: ./results

network:
  interface: eth0
  protocol: tcp

monitoring:
  collect_latency: true
  collect_network: true
  collect_energy: true