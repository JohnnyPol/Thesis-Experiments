experiment:
  id: exp1_4
  name: ee_homogeneous_3nodes
  description: Early-exit ResNet-18 inference distributed across 3 homogeneous worker nodes, coordinated by a master node.

config_refs:
  dataset: configs/datasets/cifar10.yaml
  model: configs/models/resnet18_ee_entropy.yaml
  system: configs/systems/homogeneous_3workers.yaml

runtime:
  batch_size: 1
  warmup_samples: 20
  save_per_sample_metrics: true
  save_predictions: false

output:
  dir: ./results/exp1_single_model/04_homogeneous_3workers_ee/run_001