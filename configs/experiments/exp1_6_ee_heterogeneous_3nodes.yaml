experiment:
  id: exp1_6
  name: ee_heterogeneous_3nodes
  description: Early-exit ResNet-18 distributed across two Raspberry Pi workers and one Jetson Nano as the final worker.

config_refs:
  dataset: configs/datasets/cifar10.yaml
  model: configs/models/resnet18_ee_entropy.yaml
  system: configs/systems/heterogeneous_2pis_jetson_final.yaml

runtime:
  batch_size: 1
  warmup_samples: 20
  save_per_sample_metrics: true
  save_predictions: false

partitioning:
  node_1:
    stages: [conv1, maxpool, layer0, exit0, layer1, exit1]
  node_2:
    stages: [layer2, exit2]
  node_3:
    stages: [layer3, avgpool, fc]

output:
  dir: ./results/exp1_single_model/06_heterogeneous_2pis_jetson_3workers/run_001
