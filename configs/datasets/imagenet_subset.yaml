name: imagenet_subset
root: ./data/imagenet_subset
num_classes: 1000
download: false

input:
  image_size: 256
  channels: 3

normalization:
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

loader:
  batch_size: 1
  shuffle: false
  num_workers: 0
  pin_memory: false

splits:
  valid_size: 0.1
  random_seed: 42